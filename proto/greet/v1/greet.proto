syntax = "proto3";

package greet.v1;

import "person/v1/person.proto";

message GreetPersonRequest {
  person.v1.Person person = 1;
}

message GreetPersonResponse {
  string message = 1;
}

message GreetPetRequest {
  person.v1.Person person = 1;
}

message GreetPetResponse {
  string message = 1;
}

service GreetService {
  rpc GreetPerson(GreetPersonRequest) returns (GreetPersonResponse) {}
  rpc GreetPet(GreetPetRequest) returns (GreetPetResponse) {}
}
